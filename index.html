<!DOCTYPE html>
<html lang="ko">

    <script>
        tailwind.config = {

        .kakao-bg:hover { background-color: #fbd300; }

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="text/babel">

        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
        };

        function AdopterLanding() {
            const [isYearly, setIsYearly] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [submitError, setSubmitError] = useState(null);
            
            useEffect(() => {
                AOS.init({ duration: 800, once: true, offset: 50 });
                lucide.createIcons();

                // Check for success parameter in URL (for robust redirects)
                const params = new URLSearchParams(window.location.search);
                if (params.get('success') === 'true') {
                    setIsSubmitted(true);
                    // 3초 후 파라미터 제거 (선택 사항)

                            if (el.scrollLeft + el.clientWidth >= el.scrollWidth - 10) {
                                el.scrollTo({ left: 0, behavior: 'smooth' });
                            } else {
                                el.scrollBy({ left: id === 'partner-slider' ? 180 : 320, behavior: 'smooth' });
                            }
                        }
                    });
                }, 3000); // 3초마다 롤링

                // Cleanup function
                return () => clearInterval(autoScrollInterval);
            }, []);

                            <div className="flex gap-2 sm:gap-4 lg:ml-4">
                                <a href="tel:070-7954-1417" className="hidden sm:flex bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-100 px-4 py-2 rounded-full font-bold text-sm items-center gap-2 transition-all">

                                <a href="#contact" className="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-full font-black text-sm sm:text-base transition-all shadow-lg active:scale-95">
                                    신청하기
                                </a>
                            </div>
                        </div>
                    </header>

                    <section className="pt-40 pb-24 px-5 relative overflow-hidden flex items-center min-h-[90vh] bg-slate-950">

                                    </div>
                                ) : (
                                    <>
                                        <h2 className="text-2xl font-black mb-12 text-center italic flex items-center justify-center gap-2 underline decoration-brand-500 underline-offset-8">무료 상담 예약</h2>
                                        <form onSubmit={handleSubmit} className="space-y-6">
                                            <div className="grid sm:grid-cols-2 gap-6">
                                                <input type="text" name="name" required placeholder="매장명 또는 성함 *" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg" />
                                                <input type="tel" name="phone" required placeholder="연락처 *" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg" />
                                            </div>
                                            <select name="plan" required className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg border-slate-700 bg-slate-900 border border-slate-700">
                                                <option value="" disabled selected>희망 플랜 선택 *</option>
                                                <option value="기본형">기본형 (강력 추천)</option>
                                                <option value="실속형">실속형 (홍보 입문)</option>
                                                <option value="고급형">고급형 (매출 성장/브랜딩)</option>
                                                <option value="기타상담">기타 맞춤 상담</option>
                                            </select>
                                            <textarea name="message" rows="4" placeholder="지역과 고민거리를 남겨주세요. (선택사항)" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg resize-none"></textarea>
                                            
                                            <button 
                                                type="submit" 
                                                disabled={isSubmitting}
                                                className={`w-full ${isSubmitting ? 'bg-slate-700' : 'bg-brand-600 hover:bg-brand-500'} text-white py-6 rounded-3xl font-black text-2xl shadow-xl active:scale-[0.98] mt-4 uppercase italic flex items-center justify-center gap-3 transition-all`}
                                            >
                                                {isSubmitting ? (
                                                    <span className="flex items-center gap-2">
                                                        <span className="w-5 h-5 border-4 border-white/20 border-t-white rounded-full animate-spin"></span>
                                                        전송 중...
                                                    </span>
                                                ) : (
                                                    <>무료 상담 신청 <Icon name="send" /></>
                                                )}
                                            </button>
                                            <p className="text-center text-slate-500 text-[11px] font-medium mt-4">개인정보 보호를 위해 상담 신청 용도로만 활용됩니다.</p>
                                        </form>
                                    </>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 px-5 bg-slate-950 border-t border-slate-900">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div>
                                <div className="text-4xl font-black text-brand-500 mb-6 tracking-tighter cursor-pointer" onClick={() => window.scrollTo(0,0)}>adopter</div>
                                <p className="text-slate-500 text-lg leading-loose max-w-sm font-bold">사장님의 든든한 온라인 조력자, 어댑터가 장사의 판을 바꿔 드립니다.</p>
                            </div>
                            <div className="text-right flex flex-col items-center md:items-end">
                                <div className="flex gap-8 mb-8 text-slate-500 text-sm font-black uppercase tracking-widest">
                                    <a href="#problems" className="hover:text-white transition">Backstory</a>
                                    <a href="#pricing" className="hover:text-white transition">Pricing</a>
                                    <a href="#faq" className="hover:text-white transition">Info</a>
                                </div>
                                <p className="text-slate-600 text-sm italic font-bold uppercase tracking-widest">전화상담 070-7954-1417 | 평일 10:00 - 18:00 | 카카오톡은 23시까지 </p>
                                <p className="text-slate-800 text-[10px] mt-10 font-black uppercase tracking-widest italic">© 2026 ADOPTER Co., Ltd. All Rights Reserved.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdopterLanding />);
    </script>
</body>
</html>
