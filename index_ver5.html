<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adopter - 자영업자를 위한 올인원 홍보 마케팅</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }

                }
            }

    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <!-- AOS Animate -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .pricing-table-wrapper { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }

        input, textarea, select { background: rgba(30, 41, 59, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .kakao-bg { background-color: #FEE500; color: #191919; }
        .kakao-bg:hover { background-color: #FDD800; }
        .nav-link { position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: #3b82f6; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        .plan-card-active { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .hover-lift { transition: transform 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); }

</head>
<body>
    <div id="root"></div>

        };

            useEffect(() => {
                AOS.init({ duration: 800, once: true, offset: 50 });

            const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxJfCPY4d8KLOMTxLj41Bt38qHvf3kXUyNAaWJbvpt_IJs_E1Ac-BjaCqGwJzclZV7c/exec";

                        { icon: 'smartphone', text: '070 비즈니스 폰 및 스마트 상담 인프라 구축' }
                    ]
                },
                {
                    title: '고급형',
                    setup: '30만원',
                    monthly: 100000,

                    desc: '브랜딩과 SNS 성장을 위한 풀 패키지',
                    features: [
                        { icon: 'globe', text: '홈페이지 제작 및 원스톱 구축' },
                        { icon: 'search', text: '3대 포털 정식 검색 등록 (네이버, 카카오, 구글)' },

                        { icon: 'zap', text: '3대 비즈니스 최적화 (네이버 예약, 카카오 AI 상담톡, 구글 프로필)' },
                        { icon: 'smartphone', text: '070 비즈니스 폰 및 스마트 상담 인프라 구축' },
                        { icon: 'video', text: '유튜브·인스타·틱톡 3대 SNS 채널 개설' },

                    ]

            const reviews = [
                { biz: '서울 마포 삼겹살집', text: '카카오 AI 상담 세팅 후 밤늦게 오는 예약 문의 부담이 사라졌어요. 아침에 확인만 하면 되니 진짜 편합니다.', avatar: '🍖' },

            return (
                <div className="min-h-screen font-sans overflow-x-hidden bg-slate-950">

                            <div className="text-2xl sm:text-3xl font-black tracking-tighter text-brand-500 cursor-pointer" onClick={() => window.scrollTo(0,0)}>adopter</div>
                            
                            <nav className="hidden lg:flex gap-10 text-[14px] font-black text-slate-400 uppercase tracking-widest">
                                <a href="#problems" className="nav-link hover:text-brand-400 transition">서비스 배경</a>

                                </a>
                                <a href="#contact" className="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2 sm:px-6 sm:py-2.5 rounded-full font-black text-sm sm:text-base transition-all shadow-lg active:scale-95">

                                    <Icon name="alert-triangle" size={14} /> 더 이상 홍보 사기꾼들에게 돈 낭비하지 마세요!
                                </div>
                                <h1 className="text-4xl sm:text-6xl md:text-5xl lg:text-7xl font-black leading-tight mb-10 text-white tracking-tight">
                                    사장님은 <span className="text-brand-500 underline decoration-slate-800 underline-offset-4">현장</span>에만 집중하세요,<br/>

                                </h1>
                                <div className="space-y-4 mb-14 text-lg text-slate-400 font-medium leading-relaxed">
                                    <p className="flex items-center gap-4"><Icon name="check-circle" className="text-brand-500 shrink-0" size={26}/> 홈페이지 제작, 터무니없는 거품은 걷어냈습니다.</p>
                                    <p className="flex items-center gap-4"><Icon name="check-circle" className="text-brand-500 shrink-0" size={26}/> 3대 포털 및 지도앱 상위 노출 전문 설계.</p>
                                    <p className="flex items-center gap-4"><Icon name="check-circle" className="text-brand-500 shrink-0" size={26}/> 24시간 자동 AI 상담봇 연동으로 고객 대응 끝.</p>
                                </div>
                                <div className="flex gap-2 sm:gap-5 justify-start">
                                    <a href="#contact" className="flex-1 sm:flex-none flex items-center justify-center bg-brand-600 text-white px-4 sm:px-10 py-5 sm:py-6 rounded-2xl sm:rounded-3xl font-black text-xs sm:text-2xl hover:bg-brand-500 transition-all shadow-2xl active:scale-95 leading-none">
                                        <span className="hero-btn-text">상담 신청</span><Icon name="chevron-right" className="hero-btn-icon ml-1" size={20} />
                                    </a>
                                    <a href="tel:070-7954-1417" className="flex-1 sm:flex-none flex items-center justify-center bg-slate-800 text-slate-100 px-4 sm:px-10 py-5 sm:py-6 rounded-2xl sm:rounded-3xl font-bold text-xs sm:text-xl hover:bg-slate-700 transition-all gap-2 border border-slate-700 active:scale-95 leading-none">
                                        <Icon name="phone" className="hero-btn-icon" size={20} /><span className="hero-btn-text">전화문의</span>

                            <div className="relative group hidden md:block" data-aos="zoom-in" data-aos-delay="200">

                                    <div className="space-y-12 w-full">
                                        <div>
                                            <p className="text-slate-500 text-xs font-black mb-2 uppercase tracking-widest">누적 상담 및 파트너사</p>
                                            <p className="text-6xl font-black text-white">500<span className="text-2xl font-normal ml-1">건+</span></p>
                                        </div>
                                        <div className="w-full h-px bg-slate-800"></div>
                                        <div>
                                            <p className="text-slate-500 text-xs font-black mb-2 uppercase tracking-widest">도입 후 평균 유입 증가</p>
                                            <p className="text-6xl font-black text-brand-500 italic">23%<span className="text-2xl font-normal ml-1">↑</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Problems Section */}
                    <section id="problems" className="py-32 px-5 bg-slate-950">
                        <div className="max-w-6xl mx-auto text-center mb-20" data-aos="fade-up">
                            <h2 className="text-3xl sm:text-5xl font-black mb-8 leading-tight">가게 매출의 핵심,<br/><span className="text-brand-500">왜 온라인 홍보</span>를 포기하시나요?</h2>

                                                <span className="text-slate-500 text-lg font-bold">/월</span>
                                            </div>
                                            {isYearly && <p className="text-brand-400 text-xs font-black mb-4 flex items-center gap-1"><Icon name="percent" size={12} /> 연간 결제 시 20% 할인 적용됨</p>}
                                            <div className="flex items-center justify-center sm:justify-start gap-4 bg-white/5 p-4 rounded-3xl border border-white/5 mt-2">
                                                <span className="text-slate-500 text-[10px] font-black uppercase">Initial Setup Fee</span>
                                                <span className="text-slate-300 text-base font-black italic">{p.setup}</span>
                                            </div>
                                        </div>

                                        <a href="#contact" className={`w-full py-5 rounded-3xl font-black text-center transition-all active:scale-95 mb-10 text-lg ${p.best ? 'bg-brand-600 text-white shadow-xl hover:bg-brand-500 shadow-brand-500/20' : 'bg-slate-800 text-white hover:bg-slate-700'}`}>
                                            {p.title} 멤버십 시작하기
                                        </a>

                                        <div className="space-y-3.5 flex-1">
                                            <p className="text-slate-600 text-[10px] font-black uppercase tracking-widest mb-4">Features Overview</p>
                                            {p.features.map((feat, idx) => (
                                                <div key={idx} className="flex gap-4">
                                                    <div className="shrink-0 mt-1.5"><Icon name={feat.icon} size={16} className="text-brand-500" /></div>
                                                    <p className="text-slate-400 text-[13.5px] leading-snug font-medium break-keep">{feat.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* FAQ Section Restored */}
                    <section id="faq" className="py-32 px-5 bg-slate-950 border-t border-slate-900 shadow-inner">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="text-3xl sm:text-5xl font-black text-center mb-20 italic underline decoration-brand-600 underline-offset-[12px]">F.A.Q</h2>
                            <div className="grid gap-6">
                                {faqItems.map((faq, i) => (
                                    <div key={i} data-aos="fade-up" data-aos-delay={i*50} className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 hover:border-slate-600 transition group">
                                        <div className="flex gap-5 items-start mb-4">
                                            <div className="w-10 h-10 bg-brand-600 text-white rounded-xl flex items-center justify-center font-black shrink-0">Q</div>
                                            <h4 className="text-xl font-extrabold text-slate-100 group-hover:text-brand-400 transition-colors uppercase italic tracking-tighter">{faq.q}</h4>
                                        </div>
                                        <div className="flex gap-5 items-start">
                                            <div className="w-10 h-10 bg-slate-800 text-slate-600 rounded-xl flex items-center justify-center font-black shrink-0">A</div>
                                            <p className="text-slate-400 text-base leading-relaxed break-keep font-medium">{faq.a}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Partners & Reviews Section */}
                    <section id="reviews" className="py-32 px-5 bg-slate-950 border-t border-slate-900">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-20" data-aos="fade-up">
                                <h2 className="text-3xl sm:text-4xl font-black mb-8 italic uppercase tracking-tighter">Partners & Reviews</h2>
                                <p className="text-slate-400 text-lg">성공적인 파트너십과 직접 남겨주신 소중한 후기입니다.</p>
                            </div>

                            <div className="grid grid-cols-2 lg:grid-cols-6 gap-6 mb-24" data-aos="fade-up">
                                {['표선 영숙이네', '성수동 카페 O', '강남 법률사무소', '송파 필라테스', '압구정 뷰티', '동탄 펫샵'].map((name, i) => (
                                    <div key={i} className="p-6 rounded-2xl bg-slate-900 border border-slate-800 flex flex-col items-center justify-center gap-3 hover:border-brand-500 transition group cursor-default">
                                        <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-brand-500 group-hover:scale-110 transition"><Icon name="building" size={20} /></div>
                                        <span className="text-[10px] font-black text-slate-400 group-hover:text-white transition whitespace-nowrap uppercase tracking-widest">{name}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="grid md:grid-cols-3 gap-8">
                                {reviews.map((rev, i) => (
                                    <div key={i} data-aos="fade-up" data-aos-delay={i*100} className="bg-slate-900/50 p-8 rounded-[2.5rem] border border-slate-800 hover:border-slate-600 transition shadow-2xl">
                                        <div className="text-brand-500 mb-6 font-black text-xs uppercase tracking-widest">Customer Review</div>
                                        <p className="text-slate-300 text-sm italic mb-10 font-medium break-keep">"{rev.text}"</p>
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-brand-600/20 text-brand-400 rounded-full flex items-center justify-center text-lg">{rev.avatar}</div>
                                            <div>
                                                <p className="text-white font-black text-[11px] uppercase tracking-tighter">{rev.biz}</p>
                                                <p className="text-slate-500 text-[10px] uppercase mt-1">Success Partner</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact Form Section */}
                    <section id="contact" className="py-32 px-5 bg-slate-950 border-t border-slate-900 relative">
                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div data-aos="fade-right">
                                <h2 className="text-4xl sm:text-6xl font-black mb-10 leading-tight">이제 고민을 멈추고<br/><span className="text-brand-500 underline decoration-brand-600 underline-offset-8">확신</span>을 받으세요.</h2>
                                <p className="text-slate-400 text-xl mb-12 leading-relaxed font-bold">사장님께 가장 필요한 마케팅이 무엇인지 어댑터가 답을 드립니다.</p>
                                <div className="space-y-6">
                                    <a href="tel:070-7954-1417" className="flex items-center gap-6 bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 hover:border-brand-500 transition shadow-2xl active:scale-95 group">
                                        <div className="w-16 h-16 bg-brand-600 flex items-center justify-center rounded-2xl group-hover:scale-110 transition shadow-glow"><Icon name="phone" /></div>
                                        <div><p className="text-slate-500 text-sm font-bold mb-1">직통 전화 연결 10:00~18:00</p><p className="text-3xl font-black">070-7954-1417</p></div>
                                    </a>
                                    <a href={KAKAO_URL} target="_blank" className="flex items-center gap-6 kakao-bg p-8 rounded-[2.5rem] shadow-2xl active:scale-95 group">
                                        <div className="w-16 h-16 bg-slate-950 flex items-center justify-center rounded-2xl group-hover:scale-110 transition"><Icon name="message-square" className="text-yellow-400" /></div>
                                        <div><p className="text-slate-900 text-sm opacity-60 font-bold mb-1 uppercase tracking-widest">Talk Channel ~ 23:00</p><p className="text-3xl font-black text-slate-900">카카오톡 상담</p></div>
                                    </a>
                                </div>
                            </div>

                            <div className="glass-card p-12 rounded-[3.5rem] shadow-2xl border-slate-700/50" data-aos="fade-left">
                                <h2 className="text-2xl font-black mb-10 text-center italic flex items-center justify-center gap-2 underline decoration-brand-500 underline-offset-8">무료 상담 예약</h2>
                                <form action={GOOGLE_SHEET_URL} method="POST" className="space-y-6">
                                    <div className="grid sm:grid-cols-2 gap-6">
                                        <input type="text" name="name" required placeholder="매장명 또는 성함 *" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg" />
                                        <input type="tel" name="phone" required placeholder="연락처 *" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg" />
                                    </div>
                                    <select name="plan" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg border-slate-700">
                                        <option value="기본형">기본형 (적극 권장)</option>
                                        <option value="실속형">실속형 (홍보 입문)</option>
                                        <option value="고급형">고급형 (매출 성장 중)</option>
                                        <option value="최고급형">최고급형 (리브랜딩)</option>
                                        <option value="SNS단독문의">SNS 전문 관리 (별도 문의)</option>
                                    </select>
                                    <textarea name="message" rows="4" placeholder="지역과 고민거리를 남겨주세요." className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg resize-none"></textarea>
                                    <button type="submit" className="w-full bg-brand-600 hover:bg-brand-500 text-white py-6 rounded-3xl font-black text-2xl shadow-xl active:scale-[0.98] mt-4 uppercase italic">무료 상담 신청 <Icon name="send" className="inline ml-1" /></button>
                                </form>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 px-5 bg-slate-950 border-t border-slate-900">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div>
                                <div className="text-4xl font-black text-brand-500 mb-6 tracking-tighter cursor-pointer" onClick={() => window.scrollTo(0,0)}>adopter</div>
                                <p className="text-slate-500 text-lg leading-loose max-w-sm font-bold">사장님의 든든한 온라인 조력자, 어댑터가 장사의 판을 바꿔 드립니다.</p>
                            </div>
                            <div className="text-right flex flex-col items-center md:items-end">
                                <div className="flex gap-8 mb-8 text-slate-500 text-sm font-black uppercase tracking-widest">
                                    <a href="#problems" className="hover:text-white transition">Backstory</a>
                                    <a href="#pricing" className="hover:text-white transition">Pricing</a>
                                    <a href="#faq" className="hover:text-white transition">Info</a>
                                </div>
                                <p className="text-slate-600 text-sm italic font-bold uppercase tracking-widest">전화상담 070-7954-1417 | 평일 10:00 - 18:00 | 카카오톡은 23시까지 </p>
                                <p className="text-slate-800 text-[10px] mt-10 font-black uppercase tracking-widest italic">© 2026 ADOPTER Co., Ltd. All Rights Reserved.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdopterLanding />);
    </script>
</body>
</html>
