                                        <div><p className="text-slate-900 text-sm opacity-60 font-bold mb-1">실시간 상담톡</p><p className="text-3xl font-black text-slate-900">어댑터 1:1 채팅</p></div>
                                    </a>

                                    <select name="plan" className="w-full px-6 py-4 rounded-2xl outline-none font-bold text-lg border-slate-700">
                                        <option value="기본형">기본형 (적극 권장)</option>
                                        <option value="실속형">실속형 (홍보 입문)</option>
                                        <option value="고급형">고급형 (매출 성장 중)</option>
                                        <option value="최고급형">최고급형 (리브랜딩)</option>

                                    <button type="submit" className="w-full bg-brand-600 hover:bg-brand-500 text-white py-6 rounded-3xl font-black text-2xl shadow-xl active:scale-[0.98] mt-4 uppercase">Submit <Icon name="send" className="inline ml-1" /></button>
                                </form>
                            </div>

                    </section>

                    {/* Footer */}

                                <p className="text-slate-500 text-lg leading-loose max-w-sm">사장님의 든든한 온라인 조력자, 어댑터가 장사의 판을 바꿔 드립니다.</p>

                            <div className="text-right flex flex-col items-center md:items-end">
